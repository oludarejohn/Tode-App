<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Modern Todo App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ TaskFlow</h1>
            <p>Stay organized, stay productive</p>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
            <button id="addBtn">Add Task</button>
        </div>

        <div class="stats">
            <span id="totalTasks">0 tasks</span>
            <span id="completedTasks">0 completed</span>
        </div>

        <ul id="taskList"></ul>

        <footer>
            <button id="clearCompleted" class="secondary">Clear Completed</button>
            <p class="hint">Click on a task to mark as done</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
